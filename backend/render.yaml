services:
  - type: web
    name: axon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.server:app --host 0.0.0.0 --port $PORT --workers 1 --limit-max-requests 500
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: AXON_CORS_ORIGINS
        value: https://axon-six-amber.vercel.app
      - key: XLAYER_RPC_URL
        value: https://rpc.xlayer.tech
      - key: AXON_AGENT_WALLET
        value: 0xDb82c0d91E057E05600C8F8dc836bEb41da6df14
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OKLINK_API_KEY
        sync: false
